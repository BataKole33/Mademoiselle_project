    <main>
        <section class="contact-section">
            <div class="container">
                <div class="row justify-content-between">
                    <div class=" col-12 col-lg-6 col-xl-5 mb-5 mb-lg-0">
                        <h4 class="contact-title">
                            Please contact us using the form bellow
                        </h4>
                        <form class="contact-form" action="" method="get">
                            <div class="form-group animation" data-animation="slide-top" data-delay="0.3s">
                                <input type="text" value="" placeholder="Name and Surname*" name="contact_name"
                                    class="form-control">
                                <div class="invalid-feedback">

                                </div>
                            </div>
                            <div class="form-group animation" data-animation="slide-top" data-delay="0.6s">
                                <input type="email" name="contact_email" value="" placeholder="Email address*"
                                    class="form-control">
                                <div class="invalid-feedback">

                                </div>
                            </div>
                            <div class="form-group animation" data-animation="slide-top" data-delay="0.9s">
                                <input type="text" name="contact_subject" value="" placeholder="Subject*"
                                    class="form-control">
                                <div class="invalid-feedback">

                                </div>
                            </div>
                            <div class="form-group animation" data-animation="slide-top" data-delay="1.2s">
                                <textarea name="contact_message" class="form-control" rows="3"
                                    placeholder="Enter your message*"></textarea>
                                <div class="invalid-feedback">

                                </div>
                            </div>
                            <div class="form-group animation" data-animation="slide-top" data-delay="1.2s">
                                <button class="btn" type="submit" name="send" value="yes">
                                    send message
                                </button>
                            </div>
                        </form>
                    </div>
                    <div class="contact-map col-12 col-lg-6 ">
                        <iframe
                            src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d1595.7325499191131!2d-3.8413662749068607!3d55.554894882299095!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ssr!2srs!4v1774727525437!5m2!1ssr!2srs"
                            width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                            referrerpolicy="no-referrer-when-downgrade"></iframe>
                    </div>
                </div>
            </div>
        </section>
        <section class="contact-info text-center">
            <article class="contact-info-box">
                <a href="https://www.google.com/maps/@55.5548949,-3.8413663,17.5z?entry=ttu&g_ep=EgoyMDI2MDMyNC4wIKXMDSoASAFQAw%3D%3D"
                    target="_blank" class="d-block animation" data-animation="slide-right" data-delay="0.5s">146 Douglas
                    Dale Suite 343</a>
                <a href="tel:560-748-5959" class="d-block animation" data-animation="slide-right"
                    data-delay="1s">560-748-5959</a>
                <a href="mailto:cullen_mueller@yahoo.com" class="d-block animation" data-animation="slide-right"
                    data-delay="1.5s">cullen_mueller@yahoo.com</a>
            </article>
        </section>
